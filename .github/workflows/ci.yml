name: CI & Publish

on:
  push:
    branches: [main]
    tags: ['v*']
  pull_request:
    branches: [main]

permissions:
  contents: write
  id-token: write

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: astral-sh/setup-uv@v5
        with:
          version: "latest"

      - run: uv sync --dev
      - run: uv run pytest -v

  publish-dev:
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    needs: test
    runs-on: ubuntu-latest
    environment:
      name: pypi
      url: https://pypi.org/p/cloudflare-d1cli
    steps:
      - uses: actions/checkout@v4

      - uses: astral-sh/setup-uv@v5
        with:
          version: "latest"

      - name: Set dev version from commit hash
        run: |
          BASE_VERSION=$(grep 'version' pyproject.toml | head -1 | sed 's/.*"\(.*\)".*/\1/')
          DEV_VERSION="${BASE_VERSION}.dev$(date +%Y%m%d%H%M)"
          sed -i "s/version = \".*\"/version = \"${DEV_VERSION}\"/" pyproject.toml
          echo "VERSION=$DEV_VERSION" >> "$GITHUB_ENV"

      - run: uv build

      - name: Publish to PyPI (dev)
        uses: pypa/gh-action-pypi-publish@release/v1

      - name: Create GitHub dev release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: dev-${{ github.sha }}
          name: Dev Build ${{ env.VERSION }}
          body: |
            Development build from commit `${{ github.sha }}`

            ```bash
            pip install d1cli==${{ env.VERSION }}
            ```
          prerelease: true
          make_latest: false

  publish-release:
    if: startsWith(github.ref, 'refs/tags/v')
    needs: test
    runs-on: ubuntu-latest
    environment:
      name: pypi
      url: https://pypi.org/p/cloudflare-d1cli
    steps:
      - uses: actions/checkout@v4

      - uses: astral-sh/setup-uv@v5
        with:
          version: "latest"

      - name: Set version from tag
        env:
          GIT_REF: ${{ github.ref }}
        run: |
          TAG_VERSION="${GIT_REF#refs/tags/v}"
          sed -i "s/version = \".*\"/version = \"${TAG_VERSION}\"/" pyproject.toml
          echo "VERSION=$TAG_VERSION" >> "$GITHUB_ENV"

      - run: uv build

      - name: Publish to PyPI (stable)
        uses: pypa/gh-action-pypi-publish@release/v1

      - name: Upload sdist/wheel
        uses: actions/upload-artifact@v4
        with:
          name: dist
          path: dist/

  build-binaries:
    if: startsWith(github.ref, 'refs/tags/v')
    needs: test
    strategy:
      matrix:
        include:
          - os: ubuntu-latest
            target: linux-x86_64
          - os: macos-latest
            target: macos-arm64
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4

      - uses: astral-sh/setup-uv@v5
        with:
          version: "latest"

      - name: Set version from tag
        env:
          GIT_REF: ${{ github.ref }}
        run: |
          sed -i.bak "s/version = \".*\"/version = \"${GIT_REF#refs/tags/v}\"/" pyproject.toml

      - name: Install dependencies + PyInstaller
        run: |
          uv sync
          uv pip install pyinstaller

      - name: Build standalone binary
        run: |
          uv run pyinstaller \
            --onefile \
            --name d1cli \
            --hidden-import=d1cli \
            --hidden-import=d1cli.main \
            --hidden-import=d1cli.commands \
            --hidden-import=d1cli.completer \
            --hidden-import=d1cli.connection \
            --hidden-import=d1cli.config \
            --hidden-import=d1cli.formatter \
            --hidden-import=d1cli.style \
            --hidden-import=d1cli.wrangler \
            src/d1cli/main.py

      - name: Rename binary
        run: mv dist/d1cli dist/d1cli-${{ matrix.target }}

      - name: Upload binary
        uses: actions/upload-artifact@v4
        with:
          name: binary-${{ matrix.target }}
          path: dist/d1cli-${{ matrix.target }}

  release:
    if: startsWith(github.ref, 'refs/tags/v')
    needs: [publish-release, build-binaries]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Create GitHub release
        uses: softprops/action-gh-release@v2
        with:
          name: v${{ github.ref_name }}
          generate_release_notes: true
          make_latest: true
          files: |
            artifacts/binary-*/d1cli-*
            artifacts/dist/*.whl
            artifacts/dist/*.tar.gz

  update-homebrew:
    if: startsWith(github.ref, 'refs/tags/v')
    needs: publish-release
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          repository: emerleite/homebrew-tap
          token: ${{ secrets.HOMEBREW_TAP_TOKEN }}
          path: homebrew-tap

      - name: Generate formula
        env:
          GIT_REF: ${{ github.ref }}
        run: |
          TAG_VERSION="${GIT_REF#refs/tags/v}"

          python3 << 'PYSCRIPT'
          import json, urllib.request, os

          version = os.environ["GIT_REF"].replace("refs/tags/v", "")

          def get_sdist(pkg):
              data = json.loads(urllib.request.urlopen(f"https://pypi.org/pypi/{pkg}/json").read())
              ver = data["info"]["version"]
              for u in data["urls"]:
                  if u["packagetype"] == "sdist":
                      return u["url"], u["digests"]["sha256"]
              return None, None

          # Main package
          main_url, main_sha = get_sdist(f"cloudflare-d1cli")
          # Override with versioned URL
          data = json.loads(urllib.request.urlopen(f"https://pypi.org/pypi/cloudflare-d1cli/{version}/json").read())
          for u in data["urls"]:
              if u["packagetype"] == "sdist":
                  main_url, main_sha = u["url"], u["digests"]["sha256"]

          deps = [
              "prompt-toolkit", "pygments", "cli-helpers", "click", "httpx",
              "tomli-w", "wcwidth", "tabulate", "configobj",
              "anyio", "certifi", "h11", "httpcore", "idna",
          ]

          resources = ""
          for pkg in deps:
              url, sha = get_sdist(pkg)
              if url:
                  resources += f'  resource "{pkg}" do\n'
                  resources += f'    url "{url}"\n'
                  resources += f'    sha256 "{sha}"\n'
                  resources += f'  end\n\n'

          formula = f'''class D1cli < Formula
            include Language::Python::Virtualenv

            desc "Interactive SQL REPL for Cloudflare D1 databases"
            homepage "https://github.com/emerleite/d1cli"
            url "{main_url}"
            sha256 "{main_sha}"
            license "MIT"

            depends_on "python@3.12"

          {resources}
            def install
              virtualenv_install_with_resources
            end

            test do
              assert_match "d1cli", shell_output("#{{bin}}/d1cli --version")
            end
          end
          '''

          with open("homebrew-tap/Formula/d1cli.rb", "w") as f:
              f.write(formula)
          PYSCRIPT

      - name: Commit formula update
        run: |
          cd homebrew-tap
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add Formula/d1cli.rb
          git diff --cached --quiet || git commit -m "Update d1cli to ${GITHUB_REF#refs/tags/}"
          git push
